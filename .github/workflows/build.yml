name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip -o pk-earn-pro.zip -d extracted_project
        ls -R extracted_project

    - name: Build Debug APK
      run: |
        # Yahan hum folder ki list check karenge
        cd extracted_project
        ls -d */ 
        cd $(ls -d */ | head -n 1)
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: extracted_project/**/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip -o pk-earn-pro.zip -d extracted_project
        find . -name gradlew # Ye command gradlew ka sahi rasta dhoond legi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Debug APK
      run: |
        # Ye line khud gradlew ka path dhoond kar build shuru kar degi
        GRADLEW_PATH=$(find . -name gradlew)
        chmod +x $GRADLEW_PATH
        $GRADLEW_PATH assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: **/app/build/outputs/apk/debug/app-debug.apk
        
